services:
  # ─── Web (Django + Gunicorn) ──────────────────────────────────────────────────
  - type: web
    name: grenier-commun
    env: python
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: localhost,127.0.0.1,grenier-commun.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: grenier-commun-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: grenier-commun-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: grenier-commun-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: grenier-commun-redis
          type: redis
          property: connectionString
      # ── À renseigner manuellement dans le dashboard Render ──
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false

  # ─── Redis ────────────────────────────────────────────────────────────────────
  - type: redis
    name: grenier-commun-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: grenier-commun-db
    databaseName: grenier_commun
    user: gc_user
